<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d0618"/>
      <stop offset="45%" stop-color="#1a0f2e"/>
      <stop offset="100%" stop-color="#12081f"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="35%" r="55%">
